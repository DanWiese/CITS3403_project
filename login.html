<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHINDIG — Join the Party</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
/* Background */
.bg-wrap {
    position: fixed;
    inset: 0;
    z-index: -1;
}
.bg-wrap img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.2s ease;
    filter: brightness(0.4);
}
.bg-wrap img.active {
    opacity: 1;
}

/* Center layout */
.full-height {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Title ABOVE card */
.site-title {
    text-align: center;
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 1.5rem;
    color: var(--text-main);
}

.site-title span {
    color: var(--secondary-color);
}

/* Card */
.auth-card {
    max-width: 420px;
    margin: 0 auto;
}

/* Fix spacing */
.form-control {
    margin-bottom: 1.2rem;
}

/* Force light text inside card */
.card,
.card p,
.card h2,
.card label,
.card div {
    color: var(--text-main);
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="bg-wrap">
    <img src="ImageFolder/Image1.jpg" class="active">
    <img src="ImageFolder/Image2.jpg">
    <img src="ImageFolder/Image3.jpg">
</div>

<div class="container full-height">

    <!-- Title now sits ABOVE the card -->
    <div class="site-title">
        SHIN<span>DIG</span>
    </div>

    <div class="card auth-card">

        <!-- LOGIN -->
        <div id="login-section">
            <h2>Login</h2>
            <p>Ready for another Shindig?</p>

            <form>
                <input type="email" class="form-control" placeholder="Email" required>
                <input type="password" class="form-control" placeholder="Password" required>

                <button type="submit" class="btn w-100">Let's Go</button>
            </form>

            <div class="mt-3">
                New here? <a href="#" onclick="toggleAuth()">Create an Account</a>
            </div>
        </div>

        <!-- SIGN UP -->
        <div id="signup-section" class="hidden">
            <h2>Join Us</h2>
            <p>Start planning your next big event.</p>

            <form>
                <input type="text" class="form-control" placeholder="Full Name" required>
                <input type="email" class="form-control" placeholder="Email" required>
                <input type="password" class="form-control" placeholder="Create Password" required>

                <button type="submit" class="btn w-100">Sign Up</button>
            </form>

            <div class="mt-3">
                Already have an account? <a href="#" onclick="toggleAuth()">Log In</a>
            </div>
        </div>

    </div>
</div>

<script src="slideshowbackground.js"></script>

<script>
function toggleAuth() {
    document.getElementById('login-section').classList.toggle('hidden');
    document.getElementById('signup-section').classList.toggle('hidden');
}

window.addEventListener('DOMContentLoaded', () => {
    if (window.location.hash === '#signup-section') {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('signup-section').classList.remove('hidden');
    }
});
</script>

</body>
</html>
