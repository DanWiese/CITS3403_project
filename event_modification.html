<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Modify Event</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css" type="text/css">
        <script src="jquery-3.7.1.min.js"></script>
    </head>
    <body>
        <div class="container-fluid">
            <h1>Modify Event</h1>
            <form action="/" id="modifyEventForm">
                <div class="form-group">
                    <label for="event name">Event Name:</label>
                    <input type="text" class="form-control" id="event name" required>
                </div>
                
                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" class="form-control" id="location">
                </div>

                <label for="date and time options">Date and Time:</label>
                <fieldset class="form-group" id = "date and time options">
                    <div class="form-check form-switch">
                        <label class="form-check-label" for="singleDay">Single Day Event</label>
                        <input class="form-check-input" type="checkbox" role="switch" id="singleDay">
                    </div>
                    <div class="input-group" id="dates and times">
                        <span class="input-group-addon"> From: </span>
                        <input type="date" class="form-control" id="startDate">
                        <input type="time" class="form-control" id="startTime">
                        <span class="input-group-addon"> Until: </span>
                        <input type="date" class="form-control" id="finishDate">
                        <input type="time" class="form-control" id="finishTime">
                    </div>
                </fieldset>

                <label for="tab checkboxes">Optional Event Tabs:</label>
                <fieldset id = "tab checkboxes">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="polls checkbox" value="polls">
                        <label class="form-check-label" for="polls checkbox">Polls</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="expenses checkbox" value="expenses" disabled>
                        <label class="form-check-label" for="expenses checkbox">Expenses</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="discussion checkbox" value="discussion" disabled>
                        <label class="form-check-label" for="discussion checkbox">Discussion</label>
                    </div>
                </fieldset>

                <div class="form-group">
                    <label for="description">Event Description:</label>
                    <textarea class="form-control" rows="5" id="description"></textarea>
                </div>

                <div>
                    <label class="radio-inline"><input type="radio" name="optradio" checked>Private Event</label>
                    <label class="radio-inline"><input type="radio" name="optradio" disabled>Public Event</label>
                </div>

                <input type="submit" class="btn btn-success" value="Confirm">
            </form>
        </div>
        <script src="event_modification.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
