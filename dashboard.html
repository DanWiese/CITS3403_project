<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shindig — My Events</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <div class="logo-icon">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="17" rx="3" stroke="white" stroke-width="2"/>
        <path d="M8 2v4M16 2v4M3 9h18" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="8" cy="14" r="1.5" fill="white"/>
        <circle cx="12" cy="14" r="1.5" fill="white"/>
        <circle cx="16" cy="14" r="1.5" fill="white"/>
      </svg>
    </div>
    Shindig
  </a>

  <div class="nav-center">
    <button class="nav-btn active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor"/>
        <rect x="13" y="3" width="8" height="8" rx="2" fill="currentColor"/>
        <rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor"/>
        <rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor"/>
      </svg>
      Dashboard
    </button>
    <a href="event_creation.html" class="nav-btn ghost">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      + Create Event
    </a>
  </div>

  <div class="nav-right">
    <div class="user-info">
      <div class="user-avatar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5b3cf5" stroke-width="2.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
      </div>
      Rohma Rehman
    </div>
    <button class="logout-btn" title="Log out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <p class="welcome-text">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Welcome back
      </p>
      <p style="font-size:0.88rem; color:var(--text-muted); margin-bottom:6px;">Rohma Rehman</p>
      <h1>My Events</h1>
    </div>
    <a href="event_creation.html" class="create-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create Event
    </a>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon purple">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="17" rx="3" stroke="#5b3cf5" stroke-width="2"/>
          <path d="M8 2v4M16 2v4M3 9h18" stroke="#5b3cf5" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="stat-num" id="upcoming-count">0</div>
        <div class="stat-label">Upcoming</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon warm">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="17" rx="3" stroke="#f59e3c" stroke-width="2"/>
          <path d="M8 2v4M16 2v4M3 9h18" stroke="#f59e3c" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 14l2 2 4-4" stroke="#f59e3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="stat-num" id="past-count">0</div>
        <div class="stat-label">Past Events</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon teal">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="#2dbfb8" stroke-width="2" stroke-linecap="round"/>
          <circle cx="9" cy="7" r="4" stroke="#2dbfb8" stroke-width="2"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="#2dbfb8" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="stat-num" id="rsvp-count">0</div>
        <div class="stat-label">Total RSVPs</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon rose">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#f0456b" stroke-width="2"/>
          <polyline points="12 6 12 12 16 14" stroke="#f0456b" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">Total Events</div>
      </div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" type="button" data-filter="all">All Events</button>
    <button class="filter-btn" type="button" data-filter="upcoming">Upcoming</button>
    <button class="filter-btn" type="button" data-filter="past">Past</button>
  </div>

  <div id="dashboardLoader" class="dashboard-loader">Loading events…</div>
  <p class="error-message" id="load-error-message" style="display:none; color:#dc2626; margin-top:1rem;"></p>

  <div class="events-grid">
    <p class="empty-state" id="no-events-message">No events yet. Create one and it will appear here.</p>
  </div>
</main>

<script src="event_creation.js"></script>
</body>
</html>
