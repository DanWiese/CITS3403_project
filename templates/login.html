<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHINDIG — Join the Party</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
/* Background */
.bg-wrap {
    position: fixed;
    inset: 0;
    z-index: -1;
}
.bg-wrap img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.2s ease;
    filter: brightness(0.4);
}
.bg-wrap img.active {
    opacity: 1;
}

/* Center layout */
.full-height {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Title ABOVE card */
.site-title {
    text-align: center;
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 1.5rem;
    color: var(--text-main);
}

.site-title span {
    color: var(--secondary-color);
}

/* Card */
.auth-card {
    max-width: 420px;
    margin: 0 auto;
}

/* Fix spacing */
.form-control {
    margin-bottom: 1.2rem;
}

/* Force light text inside card */
.card,
.card p,
.card h2,
.card label,
.card div {
    color: var(--text-main);
}

.hidden {
    display: none;
}

/* Alert styling */
.alert {
    margin-bottom: 1rem;
}

/* Loading state */
.btn:disabled {
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="bg-wrap">
    <img src="{{ url_for('static', filename='ImageFolder/Image1.jpg') }}" class="active">
    <img src="{{ url_for('static', filename='ImageFolder/Image2.jpg') }}">
    <img src="{{ url_for('static', filename='ImageFolder/Image3.jpg') }}">
</div>

<div class="container full-height">

    <!-- Title now sits ABOVE the card -->
    <div class="site-title">
        SHIN<span>DIG</span>
    </div>

    <div class="card auth-card">

        <!-- Alert messages -->
        <div id="alertBox"></div>

        <!-- LOGIN -->
        <div id="login-section">
            <h2>Login</h2>
            <p>Ready for another Shindig?</p>

            <form id="loginForm">
                <input 
                    type="email" 
                    class="form-control" 
                    id="loginEmail"
                    placeholder="Email" 
                    required>
                <input 
                    type="password" 
                    class="form-control" 
                    id="loginPassword"
                    placeholder="Password" 
                    required>

                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                    Let's Go
                </button>
            </form>

            <div class="mt-3">
                New here? <a href="#" onclick="toggleAuth(event)">Create an Account</a>
            </div>
        </div>

        <!-- SIGN UP -->
        <div id="signup-section" class="hidden">
            <h2>Join Us</h2>
            <p>Start planning your next big event.</p>

            <form id="signupForm">
                <input 
                    type="text" 
                    class="form-control" 
                    id="signupUsername"
                    placeholder="Full Name" 
                    required>
                <input 
                    type="email" 
                    class="form-control" 
                    id="signupEmail"
                    placeholder="Email" 
                    required>
                <input 
                    type="password" 
                    class="form-control" 
                    id="signupPassword"
                    placeholder="Create Password" 
                    required>

                <button type="submit" class="btn btn-primary w-100" id="signupBtn">
                    Sign Up
                </button>
            </form>

            <div class="mt-3">
                Already have an account? <a href="#" onclick="toggleAuth(event)">Log In</a>
            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='slideshowbackground.js') }}"></script>

<script>
// Toggle between login and signup
function toggleAuth(event) {
    event.preventDefault();
    document.getElementById('login-section').classList.toggle('hidden');
    document.getElementById('signup-section').classList.toggle('hidden');
    clearAlerts();
}

// Show alert message
function showAlert(message, type = 'danger') {
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
}

// Clear alerts
function clearAlerts() {
    document.getElementById('alertBox').innerHTML = '';
}

// Handle login form submission
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlerts();

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const loginBtn = document.getElementById('loginBtn');

    // Disable button
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);
        } else {
            showAlert(data.message || 'Login failed', 'danger');
        }
    } catch (error) {
        showAlert('An error occurred. Please try again.', 'danger');
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Let\'s Go';
    }
});

// Handle signup form submission
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlerts();

    const username = document.getElementById('signupUsername').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const signupBtn = document.getElementById('signupBtn');

    // Validation
    if (password.length < 6) {
        showAlert('Password must be at least 6 characters', 'danger');
        return;
    }

    // Disable button
    signupBtn.disabled = true;
    signupBtn.textContent = 'Creating account...';

    try {
        const response = await fetch('/signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (response.ok) {
            showAlert('Account created! Redirecting to dashboard...', 'success');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            showAlert(data.message || 'Signup failed', 'danger');
        }
    } catch (error) {
        showAlert('An error occurred. Please try again.', 'danger');
    } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = 'Sign Up';
    }
});

// Check if signup section should be shown on page load
window.addEventListener('DOMContentLoaded', () => {
    if (window.location.hash === '#signup-section') {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('signup-section').classList.remove('hidden');
    }
});
</script>

</body>
</html>
